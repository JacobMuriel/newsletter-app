services:
  - type: web
    name: briefing-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: MAX_STORIES_FETCHED
        value: "80"
      - key: OPENAI_API_KEY
        sync: false  # set manually in Render dashboard, never commit this
      - key: GROK_ENABLED
        value: "true"
      - key: GROK_API_KEY
        sync: false  # set manually in Render dashboard, never commit this
