services:
  - type: web
    name: briefing-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: MAX_STORIES_FETCHED
        value: "80"
      - key: OPENAI_API_KEY
        sync: false
      - key: GROK_ENABLED
        value: "true"
      - key: GROK_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  - type: cron
    name: briefing-cron
    env: python
    schedule: "0 12 * * *"   # 7am US Central (UTC-5)
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_pipeline.py
    envVars:
      - key: OPENAI_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: GROK_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
