name: Daily Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"   # 6am CT primary (UTC-5)
    - cron: "0 19 * * *"   # 2pm CT secondary
    - cron: "0 23 * * *"   # 6pm CT secondary

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          # Primary run is the 11:00 UTC / 6am CT job.
          # workflow_dispatch always runs as primary so manual triggers get a full pipeline.
          if [ "$HOUR" = "11" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "top_only=false" >> $GITHUB_OUTPUT
          else
            echo "top_only=true" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline and write to Redis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ENABLED: "true"
          OPENAI_MODEL: "gpt-4o-mini"
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_ENABLED: "true"
          AI_SOCIAL_ENABLED: "true"
          FINANCE_SOCIAL_ENABLED: "true"
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NBA_STATS_ENABLED: "true"
        run: |
          if [ "${{ steps.mode.outputs.top_only }}" = "true" ]; then
            python cron_pipeline.py --top-only
          else
            python cron_pipeline.py
          fi

      - name: Trigger Render deploy
        if: success()
        run: |
          curl -f -s -X POST https://api.render.com/v1/services/srv-d6tbca0gjchc73cb5fd0/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Wait for Render and warm cache
        if: success()
        run: |
          echo "Waiting for Render to come live..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s https://newsletter-app-ry48.onrender.com/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "Server live — warming cache..."
              curl -s https://newsletter-app-ry48.onrender.com/warmup
              echo "Cache warmed."
              exit 0
            fi
            echo "Not live yet (attempt $i/20), retrying in 15s..."
            sleep 15
          done
          echo "Render did not come up in time — skipping warmup"
