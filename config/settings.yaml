      - options
      - etf
      - sec
      - cftc
      - market structure
      - volatility
      - cboe
      - nba
      - playoff
      - standings

summarization:
  model: gpt-4o-mini
  temperature: 0.2
  max_output_tokens: 2000
  max_retries: 2
  confidence_weights:
    source_count: 0.9
    outlet_groups: 0.8
    reliability: 1.2
    corroboration: 2.4
  confidence_thresholds:
    medium: 4.6
    high: 7.4

delivery:
  email_subject_prefix: "[News Brief]"
