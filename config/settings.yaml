pipeline:
  max_items_per_feed: 15
  max_total_stories_fetched: 200
  max_stories_to_rank: 45
  max_stories_to_summarize: 18
  output_directory: output
  openai_enabled: true
  send_email: true
  dry_run: false

clustering:
  min_similarity: 0.53
  merge_similarity: 0.58
  max_cluster_articles: 8
  entity_overlap_min: 2
  entity_bonus: 0.04
  geopolitics_bonus: 0.05
  storyline_overlap_min: 2
  storyline_bonus: 0.06
  keyphrase_bonus: 0.08
  merge_entity_bonus_min: 2
  merge_entity_bonus: 0.05
  weights:
    title: 0.34
    snippet: 0.18
    token_overlap: 0.18
    tfidf_cosine: 0.30

section_limits:
  top: 5
  markets: 2
  ai: 3
  finance_market_structure: 3
  nba: 3

newsletter:
  title: Daily Personalized News Briefing
  date_format: "%A, %B %d, %Y"
  include_source_links: true
  nba_story_pool: 6
  nba_items_per_bucket: 3

categorization:
  priority_order:
    - nba
    - ai
    - finance_market_structure
    - markets
    - top
  rules:
    nba:
      preferred_sources:
        - ESPN NBA
      strong_keywords:
        - nba
        - finals
        - playoffs
        - playoff
        - eastern conference
        - western conference
        - lakers
        - celtics
        - knicks
        - nuggets
        - thunder
        - warriors
        - bucks
        - 76ers
        - sixers
        - mavericks
        - mavs
        - cavaliers
        - suns
        - rockets
        - bulls
        - lebron
        - curry
        - jokic
        - doncic
        - tatum
        - giannis
        - brunson
        - durant
        - embiid
        - morant
        - wembanyama
        - sengun
        - alperen
        - jalen green
        - derozan
        - lavine
        - coby white
        - vucevic
        - amen thompson
        - reed sheppard
        - cam whitmore
