quality_filter:
  minimum_score: 3
  vague_title_patterns:
    - live updates
    - watch live
    - photos
    - video
    - opinion
    - analysis
  minimum_summary_length: 40
  section_source_penalty: 1
  weak_section_match_penalty: 2
  vague_title_penalty: 1
  empty_summary_penalty: 2

ranking:
  weights:
    cluster_strength: 1.25
    source_quality: 1.8
    outlet_spread: 1.1
    corroboration: 1.5
    major_outlet_presence: 1.0
    category_importance: 1.2
    impact_keywords: 1.4
    personal_relevance: 1.4
    recency: 1.1
    ideological_spread: 2.0
  category_importance:
    top: 3.2
    markets: 2.7
    ai: 2.6
    finance_market_structure: 2.5
    nba: 1.8
  source_priority:
    default: 1.0
    weights:
      Reuters World: 4.0
      Reuters Business: 4.0
      Associated Press: 4.0
      AP: 4.0
      SEC Press Releases: 4.0
      CFTC Press Releases: 4.0
      New York Times Home: 3.0
      CNBC Markets: 3.0
      Ars Technica: 3.0
      BBC World News: 3.0
      Wall Street Journal: 3.0
      The Guardian World: 2.5
      Politico: 2.5
      The Hill: 2.0
      Axios: 2.5
      NPR News: 2.5
      The Verge: 2.0
      TechCrunch: 2.0
      MarketWatch Top Stories: 2.0
      Fox News Politics: 2.0
      ESPN NBA: 2.0
      VentureBeat AI: 2.0
      Washington Examiner: 2.0
      National Review: 1.5
      The Atlantic: 2.0
    major_outlets:
      - Reuters World
